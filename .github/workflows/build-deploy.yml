name: Build & Deploy APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: |
          cd puzzle_android
          gradle assembleDebug --no-daemon

      - name: Generate version.json
        run: |
          VC=$(grep -m1 'versionCode' puzzle_android/app/build.gradle.kts | grep -o '[0-9]\+')
          VN=$(grep -m1 'versionName' puzzle_android/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          printf '{"versionCode":%s,"versionName":"%s"}\n' "$VC" "$VN" \
            > /tmp/puzzle_android_version.json
          cat /tmp/puzzle_android_version.json

      - name: Deploy to Hetzner
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          SSH="ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null deployer@46.225.83.170"
          TARGET="deployer@46.225.83.170:/var/www/downloads"

          # APK deployen
          $SCP puzzle_android/app/build/outputs/apk/debug/app-debug.apk \
               $TARGET/puzzle_android.apk

          # Version-JSON deployen (wird von der App für Auto-Update genutzt)
          $SCP /tmp/puzzle_android_version.json \
               $TARGET/puzzle_android_version.json

          # Landing page deployen
          $SCP server-setup/downloads-page/index.html \
               $TARGET/index.html

          # Nginx neu laden (falls nötig)
          $SSH "sudo nginx -t && sudo systemctl reload nginx" || true

          rm -f /tmp/deploy_key
          echo "Deployed at $(date)"
