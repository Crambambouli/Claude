name: Build & Deploy APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build debug APK
        run: |
          cd puzzle_android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Deploy to Hetzner
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          SCP="scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          TARGET="deployer@46.225.83.170:/var/www/downloads"

          $SCP puzzle_android/app/build/outputs/apk/debug/app-debug.apk \
               $TARGET/puzzle_android.apk

          $SCP server-setup/downloads-page/index.html \
               $TARGET/index.html

          rm -f /tmp/deploy_key
          echo "Deployed at $(date)"
