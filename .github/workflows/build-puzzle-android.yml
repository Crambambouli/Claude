name: Build Puzzle Android

on:
  push:
    branches:
      - 'claude/android-jigsaw-puzzle-app-*'
  pull_request:
    paths:
      - 'puzzle_android/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        working-directory: puzzle_android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: puzzle-debug-apk
          path: puzzle_android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
