<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blitztext – Einstellungen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 20px;
      user-select: none;
    }

    h1 { font-size: 16px; font-weight: 600; margin-bottom: 18px; color: #89b4fa; }

    .section {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6c7086;
      margin-bottom: 12px;
    }

    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      margin-bottom: 4px;
      color: #bac2de;
      font-size: 12px;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #45475a;
      border-radius: 5px;
      background: #313244;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #89b4fa; }
    input::placeholder { color: #585b70; }

    .hint {
      margin-top: 4px;
      font-size: 11px;
      color: #6c7086;
    }

    .check-btn {
      display: inline-block;
      margin-top: 6px;
      padding: 5px 12px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 5px;
      color: #bac2de;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s;
    }
    .check-btn:hover { background: #45475a; }

    .check-result {
      margin-top: 6px;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 4px;
      display: none;
    }
    .check-result.ok    { background: #1e3a2f; color: #a6e3a1; display: block; }
    .check-result.error { background: #3a1e1e; color: #f38ba8; display: block; }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 6px;
    }

    button {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }

    .btn-save   { background: #89b4fa; color: #1e1e2e; }
    .btn-cancel { background: #313244; color: #cdd6f4; border: 1px solid #45475a; }
    .btn-log    { background: #313244; color: #6c7086; border: 1px solid #313244;
                  font-size: 11px; padding: 6px 12px; }
  </style>
</head>
<body>
<h1>⚙  Blitztext – Einstellungen</h1>

<!-- Whisper -->
<div class="section">
  <div class="section-title">Whisper STT</div>
  <div class="field">
    <label for="whisperPath">Whisper-Pfad (leer = aus PATH)</label>
    <input id="whisperPath" type="text" placeholder="z.B. C:\Python311\Scripts\whisper.exe">
    <div class="hint">Python-Paket installieren: <code>pip install faster-whisper</code></div>
    <button class="check-btn" onclick="checkWhisper()">Installation prüfen</button>
    <div id="checkResult" class="check-result"></div>
  </div>
  <div class="field">
    <label for="whisperModel">Modell</label>
    <select id="whisperModel">
      <option value="tiny">tiny  (schnell, weniger genau)</option>
      <option value="base" selected>base  (empfohlen)</option>
      <option value="small">small</option>
      <option value="medium">medium</option>
      <option value="large">large  (langsam, sehr genau)</option>
    </select>
  </div>
  <div class="field">
    <label for="whisperLanguage">Sprache</label>
    <select id="whisperLanguage">
      <option value="auto">Automatisch erkennen</option>
      <option value="de">Deutsch</option>
      <option value="en">Englisch</option>
      <option value="fr">Französisch</option>
      <option value="es">Spanisch</option>
      <option value="it">Italienisch</option>
    </select>
  </div>
</div>

<!-- Claude API -->
<div class="section">
  <div class="section-title">Claude API (für Modi Plus / Rage / Emoji)</div>
  <div class="field">
    <label for="apiKey">Anthropic API Key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-…">
    <div class="hint">Wird lokal in config.json gespeichert – niemals übertragen.</div>
  </div>
</div>

<!-- Hotkey & Audio -->
<div class="section">
  <div class="section-title">Hotkey &amp; Audio</div>
  <div class="field">
    <label for="hotkey">Globaler Hotkey</label>
    <input id="hotkey" type="text" placeholder="Ctrl+F8">
    <div class="hint">Beispiele: F8, F9, Alt+F8, Ctrl+Shift+R</div>
  </div>
  <div class="field">
    <label for="audioDevice">Mikrofon</label>
    <select id="audioDevice">
      <option value="">Standard-Mikrofon</option>
    </select>
  </div>
</div>

<!-- Aktionen -->
<div class="actions">
  <button class="btn-log" onclick="openLog()">Log öffnen</button>
  <button class="btn-cancel" onclick="window.close()">Abbrechen</button>
  <button class="btn-save" onclick="save()">Speichern</button>
</div>

<script>
  const api = window.electronAPI;

  // ─── Init ──────────────────────────────────────────────────────────────
  api.onSettingsInit((s) => {
    document.getElementById('whisperPath').value     = s.whisperPath     ?? '';
    document.getElementById('whisperModel').value    = s.whisperModel    ?? 'base';
    document.getElementById('whisperLanguage').value = s.whisperLanguage ?? 'auto';
    document.getElementById('apiKey').value          = s.apiKey          ?? '';
    document.getElementById('hotkey').value          = s.hotkey          ?? 'Ctrl+F8';
    document.getElementById('audioDevice').value     = s.audioDevice     ?? '';
  });

  // Geräte laden
  api.getAudioDevices().then((devices) => {
    const sel = document.getElementById('audioDevice');
    for (const d of devices) {
      const opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.label;
      sel.appendChild(opt);
    }
  });

  // ─── Whisper-Check ─────────────────────────────────────────────────────
  async function checkWhisper() {
    const path = document.getElementById('whisperPath').value;
    const res  = await api.checkWhisper(path);
    const el   = document.getElementById('checkResult');
    el.textContent = res.message;
    el.className   = 'check-result ' + (res.ok ? 'ok' : 'error');
  }

  // ─── Speichern ─────────────────────────────────────────────────────────
  function save() {
    api.saveSettings({
      whisperPath:     document.getElementById('whisperPath').value.trim(),
      whisperModel:    document.getElementById('whisperModel').value,
      whisperLanguage: document.getElementById('whisperLanguage').value,
      apiKey:          document.getElementById('apiKey').value.trim(),
      hotkey:          document.getElementById('hotkey').value.trim() || 'Ctrl+F8',
      audioDevice:     document.getElementById('audioDevice').value,
    });
    window.close();
  }

  function openLog() { api.openLogFile(); }
</script>
</body>
</html>
