<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle Android – Download</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    .app-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 36px;
      min-height: 18px;
    }

    .btn-install {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      color: #fff;
      text-decoration: none;
      padding: 18px 36px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(74, 222, 128, 0.35);
      margin-bottom: 14px;
    }

    .btn-install:active,
    .btn-install:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(74, 222, 128, 0.5);
    }

    .btn-download {
      display: inline-block;
      color: #4ade80;
      text-decoration: none;
      font-size: 14px;
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid #2a4a2a;
      transition: background 0.15s;
    }

    .btn-download:hover { background: #1a2e1a; }

    .notice {
      margin-top: 28px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 13px;
      color: #888;
      line-height: 1.6;
    }

    .notice strong { color: #aaa; }

    .desktop-hint {
      margin-top: 28px;
      background: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 14px;
      padding: 20px;
      font-size: 13px;
      color: #888;
    }

    .desktop-hint .qr-placeholder {
      font-size: 11px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="app-icon">🧩</span>
    <h1>Puzzle Android</h1>
    <div class="meta" id="meta">Lade Info…</div>
    <div id="content"></div>
  </div>

  <script>
    const APK = 'puzzle_android.apk';
    const isAndroid = /android/i.test(navigator.userAgent);

    document.getElementById('content').innerHTML = isAndroid
      ? `<a href="${APK}" class="btn-install" id="btn">
           <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
             <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/><line x1="4" y1="20" x2="20" y2="20"/>
           </svg>
           Jetzt installieren
         </a>
         <div class="notice">
           <strong>Hinweis:</strong> Beim ersten Mal muss auf deinem Gerät unter<br>
           <em>Einstellungen → Sicherheit</em> die Installation aus unbekannten Quellen
           für deinen Browser erlaubt sein.
         </div>`
      : `<a href="${APK}" class="btn-install">
           <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
             <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/><line x1="4" y1="20" x2="20" y2="20"/>
           </svg>
           APK herunterladen
         </a>
         <div class="desktop-hint">
           📱 Öffne diese Seite auf deinem <strong style="color:#aaa">Android-Gerät</strong>
           für den direkten Install-Button.
           <div class="qr-placeholder">URL: ${location.href}</div>
         </div>`;

    // Dateigröße laden
    fetch(APK, { method: 'HEAD' })
      .then(r => {
        const bytes = r.headers.get('content-length');
        const date  = r.headers.get('last-modified');
        const size  = bytes ? `${(bytes / 1024 / 1024).toFixed(1)} MB` : '';
        const built = date  ? ` · ${new Date(date).toLocaleDateString('de-DE')}` : '';
        document.getElementById('meta').textContent = `APK Debug Build${size ? ' · ' + size : ''}${built}`;
      })
      .catch(() => {
        document.getElementById('meta').textContent = 'APK Debug Build';
      });
  </script>
</body>
</html>
