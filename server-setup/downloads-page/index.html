<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads – demoport.de</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --surface:   #13132a;
      --surface2:  #1a1a35;
      --border:    #252540;
      --accent:    #4ade80;
      --accent2:   #22c55e;
      --text:      #e2e2f0;
      --muted:     #6b6b90;
      --android:   #3ddc84;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    header .logo { font-size: 26px; }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    header span {
      font-size: 13px;
      color: var(--muted);
      margin-left: 4px;
    }

    /* ── Main ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Category ── */
    .category { margin-bottom: 48px; }

    .category-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .category-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .category-icon.android { background: rgba(61,220,132,0.15); }

    .category-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
    }

    .category-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── App Grid ── */
    .apps-grid {
      display: grid;
      gap: 14px;
    }

    /* ── App Card ── */
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 20px;
      transition: border-color 0.2s, transform 0.15s;
    }

    .app-card:hover {
      border-color: #3a3a60;
      transform: translateY(-1px);
    }

    .app-card .icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      flex-shrink: 0;
    }

    .app-card .info h3 {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .app-card .info p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .badge.android {
      background: rgba(61,220,132,0.15);
      color: var(--android);
      border: 1px solid rgba(61,220,132,0.25);
    }

    .badge.size {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-android {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000;
      box-shadow: 0 4px 16px rgba(74,222,128,0.3);
    }

    .btn-android:hover { box-shadow: 0 6px 24px rgba(74,222,128,0.45); }

    .btn-desktop {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 580px) {
      .app-card {
        grid-template-columns: 52px 1fr;
        grid-template-rows: auto auto;
      }
      .app-card .icon { width: 52px; height: 52px; font-size: 26px; }
      .app-card .btn  { grid-column: 1 / -1; justify-content: center; }
      header { padding: 16px 20px; }
      main { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">📦</span>
  <h1>Downloads <span>· demoport.de</span></h1>
</header>

<main id="app"></main>

<footer>demoport.de &nbsp;·&nbsp; Nur für interne Nutzung</footer>

<script>
// ═══════════════════════════════════════════════
//  APP-LISTE – hier neue Apps eintragen
// ═══════════════════════════════════════════════
const APPS = [
  {
    id:          'puzzle_android',
    name:        'Puzzle Android',
    icon:        '🧩',
    description: 'Klassisches Schiebepuzzle mit modernem Compose-UI.',
    category:    'Android',
    apk:         'puzzle_android.apk',
  },
  // Weiteres Beispiel (auskommentiert):
  // {
  //   id:          'another_app',
  //   name:        'Another App',
  //   icon:        '🚀',
  //   description: 'Beschreibung',
  //   category:    'Android',
  //   apk:         'another_app.apk',
  // },
];
// ═══════════════════════════════════════════════

const isAndroid = /android/i.test(navigator.userAgent);

function installBtn(apk, id) {
  return isAndroid
    ? `<a href="${apk}" class="btn btn-android" id="btn-${id}">
         <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
           <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/><line x1="4" y1="20" x2="20" y2="20"/>
         </svg>
         Installieren
       </a>`
    : `<a href="${apk}" class="btn btn-desktop" id="btn-${id}">
         <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
           <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/><line x1="4" y1="20" x2="20" y2="20"/>
         </svg>
         APK herunterladen
       </a>`;
}

function renderCategory(name, apps) {
  const icon = name === 'Android' ? '🤖' : '📁';
  const iconClass = name === 'Android' ? 'android' : '';

  const cards = apps.map(app => `
    <div class="app-card">
      <div class="icon">${app.icon}</div>
      <div class="info">
        <h3>${app.name}</h3>
        <p>${app.description}</p>
        <div class="badges">
          <span class="badge android">${app.category}</span>
          <span class="badge size" id="size-${app.id}">…</span>
        </div>
      </div>
      ${installBtn(app.apk, app.id)}
    </div>`).join('');

  return `
    <section class="category">
      <div class="category-header">
        <div class="category-icon ${iconClass}">${icon}</div>
        <span class="category-title">${name}</span>
        <span class="category-count">${apps.length}</span>
      </div>
      <div class="apps-grid">${cards}</div>
    </section>`;
}

// Gruppieren nach Kategorie
const grouped = APPS.reduce((acc, app) => {
  (acc[app.category] = acc[app.category] || []).push(app);
  return acc;
}, {});

document.getElementById('app').innerHTML =
  Object.entries(grouped).map(([cat, apps]) => renderCategory(cat, apps)).join('');

// Dateigrößen nachladen
APPS.forEach(app => {
  fetch(app.apk, { method: 'HEAD' })
    .then(r => {
      const bytes = r.headers.get('content-length');
      const el = document.getElementById('size-' + app.id);
      if (el && bytes) el.textContent = (bytes / 1024 / 1024).toFixed(1) + ' MB';
      else if (el) el.style.display = 'none';
    })
    .catch(() => {
      const el = document.getElementById('size-' + app.id);
      if (el) el.style.display = 'none';
    });
});
</script>

</body>
</html>
