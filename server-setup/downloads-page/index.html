<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads – demoport.de</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --surface:   #13132a;
      --surface2:  #1a1a35;
      --border:    #252540;
      --accent:    #4ade80;
      --accent2:   #22c55e;
      --text:      #e2e2f0;
      --muted:     #6b6b90;
      --android:   #3ddc84;
      --warn:      #fbbf24;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }
    header .logo { font-size: 26px; }
    header h1 { font-size: 18px; font-weight: 700; color: #fff; }
    header span { font-size: 13px; color: var(--muted); margin-left: 4px; }

    /* ── Main ── */
    main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── Category ── */
    .category { margin-bottom: 32px; }
    .category-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .category-icon {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .category-icon.android { background: rgba(61,220,132,0.15); }
    .category-title {
      font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted);
    }
    .category-count {
      margin-left: auto; font-size: 12px; color: var(--muted);
      background: var(--surface2); padding: 2px 8px; border-radius: 20px;
    }

    /* ── App Grid ── */
    .apps-grid { display: grid; gap: 14px; }

    /* ── App Card ── */
    .app-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px 24px;
      display: grid; grid-template-columns: 64px 1fr auto;
      align-items: center; gap: 20px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .app-card:hover { border-color: #3a3a60; transform: translateY(-1px); }
    .app-card .icon {
      width: 64px; height: 64px; border-radius: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; flex-shrink: 0;
    }
    .app-card .info h3 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .app-card .info p  { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.3px; }
    .badge.android { background: rgba(61,220,132,0.15); color: var(--android); border: 1px solid rgba(61,220,132,0.25); }
    .badge.size    { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* ── Buttons ── */
    .btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 22px; border-radius: 50px; text-decoration: none;
      font-size: 14px; font-weight: 700; white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
    }
    .btn:hover  { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-android {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; box-shadow: 0 4px 16px rgba(74,222,128,0.3);
    }
    .btn-android:hover { box-shadow: 0 6px 24px rgba(74,222,128,0.45); }
    .btn-desktop { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

    /* ── Installation Guide (Android) ── */
    .install-guide {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .guide-toggle {
      width: 100%; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      padding: 18px 22px; color: var(--text);
      font-size: 14px; font-weight: 600; text-align: left;
      transition: background 0.15s;
    }
    .guide-toggle:hover { background: var(--surface2); }
    .guide-toggle .icon { font-size: 20px; flex-shrink: 0; }
    .guide-toggle .label { flex: 1; }
    .guide-toggle .label small { display: block; font-weight: 400; font-size: 12px; color: var(--muted); margin-top: 2px; }
    .chevron {
      font-size: 12px; color: var(--muted);
      transition: transform 0.25s; flex-shrink: 0;
    }
    .chevron.open { transform: rotate(180deg); }

    .guide-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .guide-body.open { max-height: 600px; }

    .guide-inner { padding: 4px 22px 22px; }
    .guide-inner p.intro {
      font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6;
    }

    .steps { display: flex; flex-direction: column; gap: 10px; }
    .step {
      display: flex; align-items: flex-start; gap: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
    }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: rgba(74,222,128,0.15); border: 1px solid rgba(74,222,128,0.3);
      color: var(--accent); font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .step-text { font-size: 13px; line-height: 1.6; color: var(--text); padding-top: 4px; }
    .step-text strong { color: #fff; }
    .step-text em {
      display: inline-block; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 1px 7px; font-style: normal; font-size: 12px;
      color: var(--warn); margin: 0 2px;
    }

    .guide-note {
      margin-top: 14px; padding: 12px 14px;
      background: rgba(74,222,128,0.06); border: 1px solid rgba(74,222,128,0.2);
      border-radius: 10px; font-size: 12px; color: var(--muted); line-height: 1.6;
    }
    .guide-note strong { color: var(--accent); }

    /* ── QR Code Section (Desktop) ── */
    .qr-section {
      margin-top: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 40px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 32px;
    }
    .qr-wrap {
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      display: flex;
      flex-shrink: 0;
    }
    .qr-wrap img { display: block; width: 160px; height: 160px; }
    .qr-info h2 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .qr-info p  { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .qr-steps { display: flex; flex-direction: column; gap: 6px; }
    .qr-step {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text);
    }
    .qr-step .dot {
      width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .qr-url {
      margin-top: 16px; padding: 10px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; font-size: 12px; color: var(--accent);
      font-family: monospace; word-break: break-all;
    }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 32px; font-size: 12px;
      color: var(--muted); border-top: 1px solid var(--border);
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .app-card {
        grid-template-columns: 52px 1fr;
        grid-template-rows: auto auto;
      }
      .app-card .icon { width: 52px; height: 52px; font-size: 26px; }
      .app-card .btn  { grid-column: 1 / -1; justify-content: center; }
      header { padding: 16px 20px; }
      main   { padding: 24px 16px 60px; }
      .qr-section {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 28px 24px;
      }
      .qr-wrap { margin: 0 auto; }
      .qr-steps { align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">📦</span>
  <h1>Downloads <span>· demoport.de</span></h1>
</header>

<main id="root"></main>

<footer>demoport.de &nbsp;·&nbsp; Nur für interne Nutzung</footer>

<script>
// ═══════════════════════════════════════════════
//  APP-LISTE – hier neue Apps eintragen
// ═══════════════════════════════════════════════
const APPS = [
  {
    id:          'puzzle_android',
    name:        'Puzzle Android',
    icon:        '🧩',
    description: 'Klassisches Schiebepuzzle mit modernem Compose-UI.',
    category:    'Android',
    apk:         'puzzle_android.apk',
  },
];
// ═══════════════════════════════════════════════

const isAndroid = /android/i.test(navigator.userAgent);
const pageUrl   = location.href.replace(/\/$/, '');

/* ── SVG Download-Icon ── */
const dlIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 16l-6-6h4V4h4v6h4l-6 6z"/><line x1="4" y1="20" x2="20" y2="20"/>
</svg>`;

/* ── App-Card ── */
function appCard(app) {
  const btn = isAndroid
    ? `<a href="${app.apk}" class="btn btn-android">${dlIcon} Installieren</a>`
    : `<a href="${app.apk}" class="btn btn-desktop">${dlIcon} APK herunterladen</a>`;

  return `
  <div class="app-card">
    <div class="icon">${app.icon}</div>
    <div class="info">
      <h3>${app.name}</h3>
      <p>${app.description}</p>
      <div class="badges">
        <span class="badge android">${app.category}</span>
        <span class="badge size" id="size-${app.id}">…</span>
      </div>
    </div>
    ${btn}
  </div>`;
}

/* ── Kategorie ── */
function category(name, apps) {
  const icons   = { Android: '🤖' };
  const classes = { Android: 'android' };
  return `
  <section class="category">
    <div class="category-header">
      <div class="category-icon ${classes[name] || ''}">${icons[name] || '📁'}</div>
      <span class="category-title">${name}</span>
      <span class="category-count">${apps.length}</span>
    </div>
    <div class="apps-grid">${apps.map(appCard).join('')}</div>
  </section>`;
}

/* ── Installations-Anleitung (Android) ── */
const installGuide = `
<div class="install-guide">
  <button class="guide-toggle" onclick="toggleGuide(this)" aria-expanded="false">
    <span class="icon">📋</span>
    <span class="label">
      Erste Installation? Schritt-für-Schritt Anleitung
      <small>Einmalig nötig – danach funktioniert es automatisch</small>
    </span>
    <span class="chevron">▼</span>
  </button>
  <div class="guide-body">
    <div class="guide-inner">
      <p class="intro">
        Android erlaubt standardmäßig nur Apps aus dem Play Store.
        Du musst einmalig erlauben, dass dein Browser Apps installieren darf.
      </p>
      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">Tippe oben auf <strong>„Installieren"</strong> neben der App</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">
            Android zeigt den Hinweis <em>Unbekannte App?</em><br>
            Tippe auf <strong>„Einstellungen"</strong>
          </div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">
            Aktiviere den Schalter <strong>„Apps aus dieser Quelle zulassen"</strong><br>
            (gilt nur für deinen Browser, nicht systemweit)
          </div>
        </div>
        <div class="step">
          <div class="step-num">4</div>
          <div class="step-text">
            Tippe <strong>„Zurück"</strong> – die Installation startet automatisch
          </div>
        </div>
        <div class="step">
          <div class="step-num">5</div>
          <div class="step-text">
            Tippe im Installations-Dialog auf <strong>„Installieren"</strong> – fertig ✓
          </div>
        </div>
      </div>
      <div class="guide-note">
        <strong>Hinweis:</strong> Diese Einstellung gilt nur für deinen Browser und nur für
        Apps, die du dort bewusst herunterlädst. Du kannst sie danach wieder deaktivieren.
        Bei zukünftigen Updates reicht ein Klick.
      </div>
    </div>
  </div>
</div>`;

/* ── QR-Code-Bereich (Desktop) ── */
const qrSection = `
<div class="qr-section">
  <div class="qr-wrap">
    <img
      src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(pageUrl)}&margin=0"
      alt="QR-Code für ${pageUrl}"
      width="160" height="160"
      loading="lazy"
    >
  </div>
  <div class="qr-info">
    <h2>📱 Direkt auf Android installieren</h2>
    <p>
      Scanne den QR-Code mit deinem Android-Gerät.<br>
      Du gelangst direkt zur Download-Seite mit dem One-Click Installations-Button.
    </p>
    <div class="qr-steps">
      <div class="qr-step"><span class="dot">1</span> Kamera-App oder QR-Scanner öffnen</div>
      <div class="qr-step"><span class="dot">2</span> Code scannen → Link antippen</div>
      <div class="qr-step"><span class="dot">3</span> „Installieren" tippen &amp; Anleitung folgen</div>
    </div>
    <div class="qr-url">${pageUrl}</div>
  </div>
</div>`;

/* ── Render ── */
const grouped = APPS.reduce((acc, app) => {
  (acc[app.category] = acc[app.category] || []).push(app);
  return acc;
}, {});

document.getElementById('root').innerHTML =
  Object.entries(grouped).map(([cat, apps]) => category(cat, apps)).join('') +
  (isAndroid ? installGuide : qrSection);

/* ── Dateigrößen ── */
APPS.forEach(app => {
  fetch(app.apk, { method: 'HEAD' })
    .then(r => {
      const el    = document.getElementById('size-' + app.id);
      const bytes = r.headers.get('content-length');
      if (el && bytes) el.textContent = (bytes / 1024 / 1024).toFixed(1) + ' MB';
      else if (el) el.style.display = 'none';
    })
    .catch(() => {
      const el = document.getElementById('size-' + app.id);
      if (el) el.style.display = 'none';
    });
});

/* ── Guide Toggle ── */
function toggleGuide(btn) {
  const body    = btn.nextElementSibling;
  const chevron = btn.querySelector('.chevron');
  const open    = body.classList.toggle('open');
  chevron.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
}
</script>

</body>
</html>
